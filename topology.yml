name: "scenario-1-ot-inventory-basic"

hosts:
  - name: kali-attacker
    flavor: standard.medium
    base_box:
      image: kali
      mgmt_user: kali

  - name: plc-001
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu

  - name: rtu-001
    flavor: standard.small
    base_box:
      image: debian-12-x86_64
      mgmt_user: user

  - name: hmi-001
    flavor: standard.medium
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu

  - name: engineering-ws
    flavor: standard.medium
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu

routers:
  - name: substation-router
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu

networks:
  - name: field-zone
    cidr: 10.10.10.0/24

  - name: control-zone
    cidr: 10.10.20.0/24

net_mappings:
  - host: kali-attacker
    network: field-zone
    ip: 10.10.10.10

  - host: plc-001
    network: field-zone
    ip: 10.10.10.21

  - host: rtu-001
    network: field-zone
    ip: 10.10.10.22

  - host: hmi-001
    network: control-zone
    ip: 10.10.20.11

  - host: engineering-ws
    network: control-zone
    ip: 10.10.20.12

router_mappings:
  - router: substation-router
    network: field-zone
    ip: 10.10.10.1

  - router: substation-router
    network: control-zone
    ip: 10.10.20.1

groups: []
