name: "attacker-defender-nmap-recon"

hosts:
  - name: attacker
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu

  - name: defender
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu

routers:
  - name: substation-router
    flavor: standard.small
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian

networks:
  - name: field-zone
    cidr: 10.10.10.0/24

net_mappings:
  - host: attacker
    network: field-zone
    ip: 10.10.10.10

  - host: defender
    network: field-zone
    ip: 10.10.10.20

router_mappings:
  - router: substation-router
    network: field-zone
    ip: 10.10.10.1

groups: []
